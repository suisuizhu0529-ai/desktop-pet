name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 哪怕一个平台挂了，另一个也继续完工
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: dist/桌面宠物*Setup.exe
            asset_name: desktop-pet-Setup.exe
          - os: macos-latest
            artifact_name: dist/*.dmg
            asset_name: desktop-pet.dmg

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4  # 🚀 升级到 v4

      - name: Install Node.js
        uses: actions/setup-node@v4  # 🚀 升级到 v4
        with:
          node-version: '18'
          # 👈 删掉了 cache: 'npm' 这一行，避免它去强行寻找锁文件
      - name: Install dependencies
        run: npm install # 🚀 把原来的 npm ci 改成普通的 npm install

      - name: Build React
        run: npm run react-build

      - name: Build Electron app
        run: npm run electron-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4  # 🚀 彻底修复这里：升级到 v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/

      - name: Create and Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2  # 🚀 升级到 v2，它更现代，能自动处理附件上传
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}